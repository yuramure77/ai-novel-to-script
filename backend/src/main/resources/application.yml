spring:
  application:
    name: ai-novel-to-script

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:h2:file:${H2_PATH:./data/scripttool};DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

server:
  port: ${PORT:8080}

deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
  max-tokens: 4096
  temperature: 0.7

tokenhub:
  api-key: ${TOKENHUB_API_KEY}
  api-url: https://tokenhub.tencentmaas.com/v1/api/image/lite
  model: hy-image-lite

tencent:
  cloud:
    secret-id: ${TENCENT_SECRET_ID:}
    secret-key: ${TENCENT_SECRET_KEY:}
  cos:
    bucket: ${COS_BUCKET:}
    region: ${COS_REGION:ap-guangzhou}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-string}
  expiration: 86400000
