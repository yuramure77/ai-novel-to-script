server:
  port: ${PORT:8080}

spring:
  application:
    name: ai-novel-to-script

  datasource:
    url: jdbc:h2:file:${H2_PATH:./data/scripttool};DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
  max-tokens: 4096
  temperature: 0.7

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-string}
  expiration: 86400000
