server:
  port: 8080

spring:
  application:
    name: ai-novel-to-script

  datasource:
    url: jdbc:h2:file:./data/scripttool;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

# DeepSeek API configuration
deepseek:
  api-key: sk-0a877959ad5c445490d30b9050675a84
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
  max-tokens: 4096
  temperature: 0.7

# JWT configuration
jwt:
  secret: script-tool-jwt-secret-key-2024-please-change-in-production
  expiration: 86400000  # 24 hours in milliseconds
