spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  security:
    user:
      name: test
      password: test

deepseek:
  api-key: test-key
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
  max-tokens: 4096
  temperature: 0.7

tokenhub:
  api-key: test-key
  api-url: https://tokenhub.tencentmaas.com/v1/api/image/lite
  model: hy-image-lite

tencent:
  cloud:
    secret-id: ""
    secret-key: ""
  cos:
    bucket: ""
    region: ap-guangzhou

jwt:
  secret: test-jwt-secret-key-for-testing-purposes-only
  expiration: 86400000
